<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <header class="header">
      <span id="project-header"></span>
    </header>
    <main class="main-section">
      <form class="project-form" id="project-form">
        <fieldset>
          <legend>Project Details</legend>

          <div class="form-group">
            <label for="project-title">Project Title: </label><br />
            <input
              type="text"
              id="project-title"
              name="project-title"
              value="New Project"
              required
            /><br />
            <span class="error-message" id="project-title-error"></span>
          </div>

          <div class="form-group">
            <label for="current-date">Date: </label><br />
            <input
              type="date"
              id="current-date"
              name="current-date"
              required
            /><br />
            <span class="error-message" id="current-date-error"></span>
          </div>

          <div class="form-group">
            <label for="knitting">Knitting</label>
            <input type="radio" id="knitting" value="knitting" name="craft" />
            <label for="crochet">Crochet</label>
            <input type="radio" id="crochet" value="crochet" name="craft" />
            <label for="machine-knitting">Machine Knitting</label>
            <input
              type="radio"
              id="machine-knitting"
              value="machine-knitting"
              name="craft"
            />
            <label for="loom-knitting">Loom Knitting</label>
            <input
              type="radio"
              id="loom-knitting"
              value="loom-knitting"
              name="craft"
            /><br />
            <span class="error-message" id="craft-error"></span>
          </div>

          <div class="form-group">
            <label for="pattern-link">Upload Pattern Link</label><br />
            <input type="url" id="pattern-link" name="pattern-link" /><br />
            <span class="error-message" id="pattern-link-error"></span>
          </div>

          <div class="form-group">
            <label for="fiber-type">Fiber Type (up to 20 characters)</label><br />
            <input type="text" id="fiber-type" name="fiber-type" maxlength="20"/><br />
            <span class="error-message" id="fiber-type-error"></span>
          </div>

          <div class="form-group">
            <label for="yarn-weight">Yarn Weight (up to 20 characters)</label><br />
            <input type="text" id="yarn-weight" name="yarn-weight" maxlength="20"/><br />
            <span class="error-message" id="yarn-weight-error"></span>
          </div>

          <div class="form-group">
            <label for="needle-size">Needle Size</label><br />
            <input type="text" id="needle-size" name="needle-size"/><br />
            <span class="error-message" id="needle-size-error"></span>
          </div>

          <div class="form-group">
            <label for="project-fit">Age/Size/Fit (up to 20 characters)</label><br />
            <input type="text" id="project-fit" name="project-fit" maxlength="20"/><br />
            <span class="error-message" id="project-fit-error"></span>
          </div>

          <div class="form-group">
            <label for="row-tracker">Row Tracker</label><br />
            <input type="number" id="row-tracker" name="row-tracker" /><br />
            <span class="error-message" id="row-tracker-error"></span>
          </div>
        </fieldset>
        <fieldset>
          <legend>Project Notes</legend>

          <div class="form-group">
            <label for="project-notes">Notes (up to 250 characters)</label><br />
            <textarea
              id="project-notes"
              name="project-notes"
              rows="10"
              cols="30"
              maxlength="250"
              placeholder="Type your project notes here!"
            ></textarea>
            <span class="error-message" id="project-notes-error"></span>
          </div>
          </div>
        </fieldset>
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
      </form>
      <h3>Saved Projects</h3>
      <div id="project-links-container"></div>
    </main>

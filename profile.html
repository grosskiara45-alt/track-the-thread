<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="public/css/reset.css" />
    <link rel="stylesheet" href="public/css/profile.css" />
    <title>Create Profile</title>
  </head>
  <body>
    <header class="header">
      <h1>Create Profile</h1>
      <p>Please fill out inputs to create your profile.</p>
    </header>
    <main class="main-section">
      <form class="profile-form" id="profile-form">
        <div>
          <label for="fname">First Name:</label><br />
          <input
            type="text"
            id="fname"
            name="fname"
            size="40"
            placeholder="John"
          /><br />
          <span class="error-message" id="fnameError"></span>
        </div>

        <div class="form-section">
          <label for="lname">Last Name:</label><br />
          <input
            type="text"
            id="lname"
            name="lname"
            size="40"
            placeholder="Doe"
          /><br />
          <span class="error-message" id="lnameError"></span>
        </div>

        <div class="form-section" id="theme">
          <label>Visual Preference:</label><br />
          <input type="radio" id="light" name="theme" />
          <label for="light">Light Mode</label>
          <input type="radio" id="dark" name="theme" />
          <label for="dark">Dark Mode</label>
          <span class="error-message" id="themeError"></span>
        </div>

        <button type="submit" name="submit">Submit</button>
        <button type="reset" name="reset">Reset</button>
      </form>
    </main>
    <footer class="footer"> 
      <div class="footer-group">
        <p>&copy; 2026 Kiara Gross.</p>
        <p>Built with HTML, CSS, and JavaScript.</p>
      </div>
      <div class="footer-links">
        <p>Let's Stay Connected!</p>
        <ul>
          <li><a href="https://github.com/grosskiara45-alt">GitHub</a></li>
          <li>
            <a href="https://www.linkedin.com/in/kiaragross/">LinkedIn</a>
          </li>
          <li>
            <a href="mailto:grosskiara45@gmail.com">grosskiara45@gmail.com</a>
          </li>
        </ul>
      </div>
    </footer>
    <script src="public/js/profile.js"></script>
  </body>
</html>
